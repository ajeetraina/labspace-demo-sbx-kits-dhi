schemaVersion: "1"
kind: mixin
name: dhi
displayName: Docker Hardened Images
description: |
  Teaches the agent to use Docker Hardened Images (DHI) as base images.
  Installs the DHI CLI (`dhictl` and `docker dhi`) and writes Docker
  auth placeholders for Docker Hub and dhi.io.

network:
  allowedDomains:
    - github.com
    - api.github.com
    - "*.githubusercontent.com"
    - objects.githubusercontent.com
    - release-assets.githubusercontent.com
    - dhi.io
    - api.docker.com
    - hub.docker.com
    - "*.docker.com"
    - "*.docker.io"

commands:
  install:
    - command: |
        set -eu
        DHICTL_VERSION=v0.0.3
        case "$(uname -m)" in
          x86_64)
            DHI_ARCH=amd64
            DHICTL_SHA256=7bf49639777d9db7c937d4039db2b4e46de408936b03e9a38ae0ceee2e4cfad7
            ;;
          aarch64|arm64)
            DHI_ARCH=arm64
            DHICTL_SHA256=f81037f1efa2999bd15599079962cd0627e6211815c2335575ab7530573218f7
            ;;
          *)
            echo "unsupported arch $(uname -m)" >&2
            exit 1
            ;;
        esac

        tmp="$(mktemp)"
        curl -sSfL -o "$tmp" \
          "https://github.com/docker-hardened-images/dhictl/releases/download/${DHICTL_VERSION}/dhictl-linux-${DHI_ARCH}"
        printf '%s  %s\n' "$DHICTL_SHA256" "$tmp" | sha256sum -c -
        install -m 0755 "$tmp" /usr/local/bin/dhictl
        mkdir -p /usr/local/lib/docker/cli-plugins
        ln -sf /usr/local/bin/dhictl /usr/local/lib/docker/cli-plugins/docker-dhi
        rm -f "$tmp"

        dhictl --version
        docker dhi --version || true
      user: "0"
      description: Install Docker DHI CLI as dhictl and docker dhi
    - command: |
        set -eu
        cat > /usr/local/bin/configure-dhi-auth <<'SH'
        #!/usr/bin/env sh
        set -eu

        DOCKER_HUB_AUTH_PLACEHOLDER_B64="c2J4X2RvY2tlcl9odWJfdXNlcjpzYnhfZG9ja2VyX2h1Yl9wYXQK"
        DHI_AUTH_PLACEHOLDER_B64="c2J4X2RoaV91c2VyOnNieF9kaGlfcGF0Cg=="

        write_config() {
          dir="$1"
          owner="$2"
          group="$3"

          install -d -m 0700 "$dir"
          cat > "$dir/config.json" <<EOF
        {
          "auths": {
            "https://index.docker.io/v1/": {
              "auth": "$DOCKER_HUB_AUTH_PLACEHOLDER_B64"
            },
            "https://dhi.io": {
              "auth": "$DHI_AUTH_PLACEHOLDER_B64"
            }
          }
        }
        EOF
          chown -R "$owner:$group" "$dir" 2>/dev/null || true
          chmod 0600 "$dir/config.json"
        }

        write_config /root/.docker root root
        if getent passwd agent >/dev/null 2>&1; then
          write_config /home/agent/.docker agent agent
        fi
        SH
        chmod +x /usr/local/bin/configure-dhi-auth
        /usr/local/bin/configure-dhi-auth
      user: "0"
      description: Configure Docker auth placeholders for Docker Hub and dhi.io
  startup:
    - command:
        - /usr/local/bin/configure-dhi-auth
      user: "0"
      description: Reconcile Docker auth after registry secrets are injected
