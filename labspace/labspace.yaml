metadata:
  id: shelajev/labspace-demo-sbx-kits-dhi
  sourceRepo: github.com/shelajev/labspace-demo-sbx-kits-dhi
  contentVersion: 0.1.0

title: SBX Kits and Docker Hardened Images
description: |
  Build and verify a host-backed SBX demo that uses reusable kits to guide containerization, parallel agent work, and Docker Scout policy checks.

sections:
  - title: Prerequisites
    contentPath: 01-introduction.md
  - title: Add Container Guardrails
    contentPath: 02-main-content.md
  - title: Run Parallel Agents
    contentPath: 03-conclusion.md
  - title: Gate with DHI and Scout
    contentPath: 04-dhi-scout.md

teardown_script: |
  PROJECT_DIR="${LABSPACE_PROJECT_DIR:-$HOME/.labspace/project}"
  sbx rm --force prewarm kits-smoke p1-yolo p2-best-practices p3-claude p3-opencode p4-policy || true
  rm -rf "$PROJECT_DIR/demo/sample-app/.sbx" || true
  git -C "$PROJECT_DIR/demo/sample-app" worktree prune || true
